name: Build Tenshi Docker Base (via Calling)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/hisou-tenshi/tenshi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Calling repository
        uses: actions/checkout@v5

      - name: Checkout Tenshi (build context)
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.GH_REPO }}
          token: ${{ secrets.TENSHI_BOT_ACTION_TOKEN }}
          fetch-depth: 0
          path: tenshi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.TENSHI_BOT_ACTION_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./tenshi
          file: ./tenshi/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

